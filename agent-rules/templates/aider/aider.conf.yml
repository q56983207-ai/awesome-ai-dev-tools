# Aider Configuration

# Aider Chat Tool Configuration
# https://aider.chat/docs/config.html

# Project root configuration for Aider

# Model Configuration
# Use Claude for best results with coding tasks
# Replace with your preferred model
model: claude-3-5-sonnet-20241022
edit-model: claude-3-5-sonnet-20241022

# Map tokens for larger contexts
map-tokens: 200000

# Coding Style
# Source files to read and edit
read: .py, .ts, .tsx, .js, .jsx, .md, .yaml, .yml, .json, .html, .css

# Detect dependencies and update imports
auto-requests: true
smart-prompt: true

# Git Integration
# Commit messages follow conventional commits
commit-prompts: conventional

# Verification
# Run tests after changes
test-cmd: pytest tests/ -v --tb=short || npm test || python -m pytest

# Line limit for AI context (adjust based on model context window)
line-length: 100

# No read-only files - allow edits
read-only: false

# Show diffs for edits
show-diff: true

# Always ask for confirmation before committing
confirm-commit: true

# Linting (run after edits)
lint-cmd: |
  echo "Running linters..."
  npm run lint || true
  npm run typecheck || true

# Validation commands (run before commit)
# Uses test-cmd and lint-cmd above

